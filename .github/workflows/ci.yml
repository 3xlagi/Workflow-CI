name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install mlflow scikit-learn pandas

    - name: Run MLflow Project
      run: |
        # Script python akan otomatis memuntahkan folder 'deploy_model'
        mlflow run MLProject --env-manager=local

    - name: Verifikasi Hasil 
      run: |
        echo "Mengecek apakah model berhasil dimasukkan..."
        ls -la ./deploy_model

    - name: Upload Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: model-artefak-rahmatdi
        path: ./deploy_model  
          
    - name: Build Docker Model
      run: |
        mlflow models build-docker -m ./deploy_model -n "${{ secrets.DOCKER_USERNAME }}/churn-model:v7"

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:v7