name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

# KUNCI UTAMA: Variabel global yang tidak bisa dibantah oleh MLflow
env:
  MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install mlflow scikit-learn pandas

    - name: Run MLflow Project
      run: |
        mlflow run MLProject --env-manager=local

    - name: Radar Pelacak Model (Debugging)
      run: |
        echo "=== MENCARI LOKASI MODEL ==="
        find ${{ github.workspace }} -type d -name "model"

    - name: Isolate Model Artifact
      run: |
        # Mencari dengan path absolut dari workspace
        ORIGINAL_MODEL=$(find ${{ github.workspace }} -type d -name "model" | head -n 1)
        
        if [ -z "$ORIGINAL_MODEL" ]; then
          echo "Model masih gaib! Keluar dari proses."
          exit 1
        fi
        
        echo "Ditemukan model di: $ORIGINAL_MODEL"
        cp -r "$ORIGINAL_MODEL" ./deploy_model
        
        echo "=== ISI FOLDER DEPLOY ==="
        ls -la ./deploy_model

    - name: Build Docker Model
      run: |
        # Naikkan ke versi 5 (v5) sebagai monumen kegigihan kita!
        mlflow models build-docker -m ./deploy_model -n "${{ secrets.DOCKER_USERNAME }}/churn-model:v5"

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:v5