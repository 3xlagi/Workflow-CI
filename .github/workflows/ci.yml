name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install mlflow scikit-learn pandas

    - name: Run MLflow Project
      run: |
        mlflow run MLProject --env-manager=local

    - name: Isolate Model Artifact
      run: |
        ORIGINAL_MODEL=$(find mlruns -type d -name "model" | head -n 1)
        echo "Ditemukan model di: $ORIGINAL_MODEL"
        
        # Copy folder tersebut
        cp -r "$ORIGINAL_MODEL" ./deploy_model
        echo "Isi folder siap deploy:"
        ls -la ./deploy_model

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m ./deploy_model -n "${{ secrets.DOCKER_USERNAME }}/churn-model:v3"

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:v2