name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install mlflow scikit-learn pandas

    - name: Run MLflow Project
      run: |
        mlflow run MLProject --env-manager=local

    - name: Auto-Find Model Path
      run: |
        MODEL_PATH=$(find $PWD/mlruns -type d -path "*/artifacts/model" | head -n 1)
        echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV
        echo "Ditemukan path model absolut di: $MODEL_PATH"

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m "${{ env.MODEL_PATH }}" -n "${{ secrets.DOCKER_USERNAME }}/churn-model:v1"

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:v1